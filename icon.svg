<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main background gradient: Malaysian red to warm orange -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#CC0001"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <!-- Shine highlight on top -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Card shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <!-- Soft inner glow on card -->
    <filter id="card-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Subtle stripe pattern (echoes Malaysian flag stripes) -->
  <g opacity="0.08">
    <rect x="0" y="56"  width="512" height="24" fill="#FFD700"/>
    <rect x="0" y="136" width="512" height="24" fill="#FFD700"/>
    <rect x="0" y="216" width="512" height="24" fill="#FFD700"/>
    <rect x="0" y="296" width="512" height="24" fill="#FFD700"/>
    <rect x="0" y="376" width="512" height="24" fill="#FFD700"/>
    <rect x="0" y="456" width="512" height="24" fill="#FFD700"/>
  </g>

  <!-- White flashcard shape (main visual) -->
  <rect x="80" y="108" width="352" height="240" rx="28" ry="28"
        fill="#ffffff" filter="url(#shadow)"/>

  <!-- Card top accent bar (Malaysian blue) -->
  <rect x="80" y="108" width="352" height="16" rx="0" ry="0" fill="#003087"/>
  <rect x="80" y="108" width="352" height="16" rx="0" ry="0"
        fill="none" stroke="none"/>
  <!-- Round just the top corners of the accent bar -->
  <path d="M108,108 h296 a28,28 0 0,1 28,28 v-12 h-352 v12 a28,28 0 0,1 28,-28 z"
        fill="#003087"/>

  <!-- BM text on card — bold, primary accent colour -->
  <text x="256" y="212" font-family="'Nunito','Arial Black',sans-serif"
        font-size="108" font-weight="900" text-anchor="middle"
        fill="#CC0001" letter-spacing="-4">BM</text>

  <!-- Underline dot row under BM -->
  <circle cx="194" cy="238" r="7" fill="#FFD700"/>
  <circle cx="220" cy="238" r="7" fill="#FFD700"/>
  <circle cx="246" cy="238" r="7" fill="#FFD700"/>
  <circle cx="272" cy="238" r="7" fill="#FFD700"/>
  <circle cx="298" cy="238" r="7" fill="#FFD700"/>
  <circle cx="324" cy="238" r="7" fill="#FFD700"/>

  <!-- "vocab" sub-label in blue -->
  <text x="256" y="295" font-family="'Nunito','Arial',sans-serif"
        font-size="38" font-weight="800" text-anchor="middle"
        fill="#003087" letter-spacing="6">vocab</text>

  <!-- Crescent moon (Malaysian symbol) — bottom right of card -->
  <g transform="translate(372, 144) scale(0.7)">
    <circle cx="24" cy="24" r="22" fill="#FFD700"/>
    <circle cx="34" cy="16" r="17" fill="#ffffff"/>
  </g>

  <!-- Star (bintang) next to crescent -->
  <g transform="translate(348, 140) scale(0.55)" fill="#FFD700">
    <polygon points="16,0 20,11 32,11 22,18 26,29 16,22 6,29 10,18 0,11 12,11"/>
  </g>

  <!-- Bottom label strip -->
  <rect x="80" y="390" width="352" height="56" rx="20" ry="20" fill="#003087" opacity="0.92"/>
  <text x="256" y="428" font-family="'Nunito','Arial',sans-serif"
        font-size="26" font-weight="800" text-anchor="middle"
        fill="#FFD700" letter-spacing="3">BAHASA MALAYSIA</text>

  <!-- Corner sparkle dots (top-left, top-right) -->
  <circle cx="56"  cy="56"  r="10" fill="#FFD700" opacity="0.6"/>
  <circle cx="456" cy="56"  r="10" fill="#FFD700" opacity="0.6"/>
  <circle cx="56"  cy="456" r="7"  fill="#ffffff"  opacity="0.3"/>
  <circle cx="456" cy="456" r="7"  fill="#ffffff"  opacity="0.3"/>
</svg>
